<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pallet Calculator - Wood Floor Suite</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">

    <div class="header">
      <a href="index.html" class="back-link">← Wood Floor Suite</a>
      <div class="header-label">Pallet · Bundle · Board</div>
      <h1>Wood Floor <span>Calculator</span></h1>
    </div>

    <div class="body">

      <!-- Length -->
      <div class="field-group">
        <label for="length">Bundle Length</label>
        <div class="input-row">
          <input type="text" id="length" placeholder="e.g. 12 3/4">
          <select id="lengthUnit">
            <option value="feet">ft</option>
            <option value="inches">in</option>
          </select>
        </div>
        <div class="hint">Accepts whole numbers, decimals, or fractions (e.g. 12 3/4)</div>
      </div>

      <!-- Width -->
      <div class="field-group">
        <label for="width">Board Width</label>
        <div class="input-row">
          <input type="text" id="width" placeholder="e.g. 5 1/2">
          <select id="widthUnit">
            <option value="inches">in</option>
            <option value="feet">ft</option>
          </select>
        </div>
        <div class="hint">Accepts whole numbers, decimals, or fractions (e.g. 5 1/2)</div>
      </div>

      <!-- Boards per bundle -->
      <div class="field-group">
        <label for="numberOfBoards">Boards per Bundle</label>
        <input type="number" id="numberOfBoards" placeholder="e.g. 20" min="1">
      </div>

      <!-- Bundles per pallet -->
      <div class="field-group">
        <label for="bundlesPerPallet">Bundles per Pallet</label>
        <input type="number" id="bundlesPerPallet" placeholder="e.g. 8" min="1">
      </div>

      <hr class="divider">

      <button class="calc-btn" onclick="calculate()">Calculate Square Footage</button>

      <button class="reset-btn" onclick="reset()">New Calculation</button>

      <button class="clear-btn" onclick="clearHistory()">Clear History</button>

      <div id="result"></div>

      <div id="history"></div>

    </div>

    <div class="footer">Fractions accepted · Inches or feet · Per-bundle breakdown included</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
